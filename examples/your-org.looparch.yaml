# A whole Loop Architecture: many systems and many loops in one file.
id: your-org
name: Your Org

# Systems the loops read from (use) and write back to (act).
# Each system has an id, plus an optional name / description / url / repository / connector.
# The `url` is used to fetch a favicon so diagrams get a nice icon.
systems:
  - id: dash0
    name: Dash0
    description: Observability with logs, traces and metrics (demo + prod)
    url: https://dash0.com
    connector: dash0
  - id: code-repo
    name: App Repo
    description: Application source code
    repository: https://github.com/your-org/app
  - id: infra
    name: Terraform Infra
    description: Infrastructure as code (Terraform)
    repository: https://github.com/your-org/infra
  - id: app-azure
    name: App on Azure
    description: The running application on Azure
    url: https://azure.microsoft.com
  - id: ci-cd
    name: CI/CD
    description: CI/CD Runs
    url: https://github.com/features/actions
  - id: jira
    name: Jira
    description: Service desk and tickets
    url: https://www.atlassian.com
    connector: jira
  - id: confluence
    name: Confluence
    description: Internal docs and admin runbooks
    url: https://www.atlassian.com/software/confluence
    connector: confluence
  - id: docs
    name: Docs (EN)
    description: Product documentation
    url: https://docs.your-org.com
  - id: docs-de
    name: Docs (DE)
    description: German translation of the docs
    url: https://docs.your-org.com/de
  - id: landing-page
    name: Landing Page
    description: Marketing landing page
    url: https://www.your-org.com
  - id: onedrive
    name: OneDrive
    description: Policies and vendor documents
    url: https://onedrive.live.com
  - id: policies
    name: Kertos
    description: ISO 27001 policies and vendor risks
    url: https://kertos.com
  - id: slack
    name: Slack
    description: Team chat
    url: https://slack.com
    connector: slack

loops:
  - id: triage-incidents
    name: Triage Incidents
    description: Detects and triages production incidents.
    trigger: "*/5 * * * *"
    model: claude-opus-4-8
    observe: [dash0]
    act: [jira, slack]
    prompt: >
      Watch the logs, traces and metrics for error-rate spikes and failed checks.
      When an incident is occurring, open a Jira ticket and post a summary to Slack.

  - id: fix-errors
    name: Fix Errors
    description: Fixes recurring errors found in the logs.
    trigger: "*/30 * * * *"
    observe: [dash0]
    act: [code-repo]
    prompt: >
      Find recurring errors in the logs, locate the cause in the code, and open a
      pull request that fixes it, referencing the originating trace.

  - id: deploy-previews
    name: Deploy Previews
    description: Ships a preview deploy for every commit.
    trigger: push
    observe: [ci-cd]
    act: [app-azure]
    prompt: >
      On each pushed commit, once CI passes, deploy a preview of the app to Azure
      and report the preview URL.

  - id: reconcile-infra
    name: Reconcile Infra Drift
    description: Keeps Azure in line with Terraform.
    trigger: "0 * * * *"
    observe: [infra]
    act: [app-azure]
    prompt: >
      Compare the Terraform state against the running Azure infrastructure and open
      a pull request to reconcile any drift.

  - id: sync-docs
    name: Sync Docs
    description: Keeps the docs in step with the code.
    trigger:
      - "0 6 * * *"
      - pull_request.merged
    model: claude-opus-4-8
    observe: [code-repo]
    act: [docs]
    prompt: >
      Diff the docs against the changes merged in the last 24 hours, update the
      pages that drifted, and open a pull request.
    tools: [Read, Grep, Bash(git *), Bash(gh pr *)]

  - id: translate-docs
    name: Translate Docs
    description: Keeps the German docs current.
    trigger: "0 7 * * *"
    observe: [docs]
    act: [docs-de]
    prompt: >
      For every English page changed since the German version was last updated,
      update the matching German page and open a pull request.

  - id: sync-confluence
    name: Sync Confluence
    description: Keeps internal runbooks up to date.
    trigger: "0 8 * * *"
    observe: [code-repo]
    act: [confluence]
    prompt: >
      Keep the internal admin/runbook pages in Confluence in sync with the code and
      configuration.

  - id: sync-landing-page
    name: Sync Landing Page
    description: Keeps the landing page on message.
    trigger: "0 9 * * *"
    observe: [docs]
    act: [landing-page]
    prompt: >
      Keep the feature descriptions on the landing page consistent with the docs.

  - id: answer-tickets
    name: Answer Tickets
    description: Drafts answers to service-desk tickets.
    trigger: "*/10 * * * *"
    observe: [jira]
    act: [jira]
    prompt: >
      Triage new service-desk tickets, draft an answer from the docs, and reply for
      a human to review.

  - id: review-compliance
    name: Review Compliance
    description: Reviews ISO 27001 policies weekly.
    trigger: "0 6 * * 1"
    observe: [policies]
    act: [onedrive]
    prompt: >
      Review ISO 27001 policies and vendor risks weekly, and draft updates to the
      documents in OneDrive for sign-off.
