# A second example: keeping Claude Code skills compliant with global policies.
id: skills-governance
name: Skills Governance

systems:
  - id: data-product
    name: Data Product Repo
    description: GitHub repository for a data product
    repository: https://github.com/your-org/data-product
  - id: skills
    name: Skills Repo
    description: GitHub repository with Claude Code skills
    repository: https://github.com/your-org/skills
  - id: policies
    name: Global Policies
    description: Global data governance policies in Entropy Data
    url: https://entropy-data.com
    connector: entropy-data
  - id: data-contract
    name: Data Contract
    description: Published data product and data contract YAML in Entropy Data
    url: https://entropy-data.com
    connector: entropy-data

loops:
  - id: govern-skills
    name: Govern Skills
    description: Keeps the skills compliant with global policies.
    trigger:
      - push
      - "0 6 * * *"
    model: claude-opus-4-8
    observe: [skills, data-product, policies]
    act: [skills]
    prompt: >
      Check the data product's skills against the global policies in Entropy Data.
      Open a pull request that fixes any skill which violates a policy, citing the
      policy it breaks.
    tools: [Read, Grep, Bash(git *), Bash(gh pr *)]

  - id: check-data-product
    name: Check Data Product
    description: Checks the data product is implemented per the skills.
    trigger:
      - push
      - "0 7 * * *"
    model: claude-opus-4-8
    observe: [data-product, skills]
    act: [data-product]
    prompt: >
      Check that the data product follows its skills and is implemented accordingly.
      Open a pull request (or an issue) for any place where the implementation drifts
      from what the skills prescribe.
    tools: [Read, Grep, Bash(git *), Bash(gh pr *)]

  - id: align-data-contract
    name: Align Data Contract
    description: Keeps the data product in line with its published YAML.
    trigger:
      - push
      - "0 8 * * *"
    model: claude-opus-4-8
    observe: [data-contract, data-product]
    act: [data-product]
    prompt: >
      Keep the data product in line with its published data product YAML and data
      contract YAML in Entropy Data. Open a pull request to fix any drift between the
      implementation and the published contract.
    tools: [Read, Grep, Bash(git *), Bash(gh pr *)]
